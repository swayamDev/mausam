<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mausam — Real-Time Weather Forecasts</title>
    <meta
      name="description"
      content="Accurate real-time weather forecasts with charts, maps, and air quality data worldwide."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Swayam" />

    <!-- Canonical -->
    <link rel="canonical" href="https://weather.swayam.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://weather.swayam.io/" />
    <meta property="og:title" content="Mausam — Real-Time Weather Forecasts" />
    <meta
      property="og:description"
      content="Accurate real-time weather forecasts with charts and maps."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://weather.swayam.io/" />
    <meta name="twitter:title" content="Mausam — Real-Time Weather Forecasts" />
    <meta
      name="twitter:description"
      content="Accurate real-time weather forecasts with charts and maps."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0a0a0a"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://api.openweathermap.org" crossorigin />
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Mausam",
        "url": "https://weather.swayam.io/",
        "applicationCategory": "WeatherApplication"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
